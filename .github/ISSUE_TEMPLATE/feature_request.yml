name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting
      options:
        - label: I have searched for existing feature requests that might be similar
          required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which part of the library does this feature relate to?
      options:
        - Core (encoding/decoding)
        - Schema parsing/validation
        - Code generation (avrogen)
        - Schema validation tool (avrosv)
        - Object Container Files (OCF)
        - Schema Registry client
        - Schema on Envelope (SOE)
        - Documentation
        - CLI tools
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: A clear description of what the problem is. Ex. I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: A clear description of what you want to happen
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: Other approaches you've thought about...

  - type: textarea
    id: api
    attributes:
      label: API Design (if applicable)
      description: If you have ideas about how the API should look, please share
      placeholder: |
        // Example API usage
        schema.NewFeature(...)
      render: go

  - type: dropdown
    id: breaking
    attributes:
      label: Breaking Change
      description: Would this feature require breaking changes to the existing API?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true

  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      description: Are you willing to contribute this feature?
      options:
        - "Yes, I can submit a PR"
        - "Yes, but I need guidance"
        - "No, I'm just suggesting"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references about the feature request
      placeholder: Links to similar implementations, specifications, etc.
