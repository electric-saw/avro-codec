name: Stale Issues and PRs

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          # General settings
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please comment or update the issue to keep it open.
            Thank you for your contribution!

          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs.
            If you're still working on this, please comment or push new commits to keep it open.
            Thank you for your contribution!

          close-issue-message: |
            This issue has been automatically closed due to inactivity.
            If you believe this issue is still relevant, please feel free to reopen it or create a new issue.

          close-pr-message: |
            This pull request has been automatically closed due to inactivity.
            If you're still interested in contributing this change, please feel free to reopen or submit a new PR.

          # Timing
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14

          # Labels
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

          # Exemptions - these labels prevent items from being marked stale
          exempt-issue-labels: 'pinned,security,bug,in-progress'
          exempt-pr-labels: 'pinned,security,work-in-progress'

          # Don't mark issues/PRs with milestones as stale
          exempt-all-milestones: true

          # Only process a limited number per run to avoid rate limits
          operations-per-run: 100

          # Remove stale label when there's new activity
          remove-stale-when-updated: true

          # Include draft PRs
          include-only-assigned: false
